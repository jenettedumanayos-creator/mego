<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login - Mego Craft Coffee</title>
    <style>
        body {
            background-image: url('images/bg.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-md);
        }

        .login-wrapper {
            width: 100%;
            max-width: 600px;
        }

        .login-card {
            background: var(--cream);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, var(--cafe-brown) 0%, var(--cafe-light) 100%);
            padding: var(--spacing-xl) var(--spacing-lg);
            text-align: center;
            color: var(--white);
        }

        .login-header .logo {
            margin-bottom: var(--spacing-lg);
        }

        .login-header h1 {
            color: var(--white);
            font-size: var(--font-size-2xl);
            margin-bottom: var(--spacing-sm);
            font-family: var(--font-serif);
        }

        .login-header p {
            color: var(--gold);
            font-size: var(--font-size-lg);
            margin: 0;
            letter-spacing: 1px;
        }

        .login-body {
            padding: var(--spacing-xl);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            margin-bottom: var(--spacing-sm);
            color: var(--text-dark);
            font-weight: 600;
            font-size: var(--font-size-sm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: var(--spacing-md);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            transition: all var(--transition-base);
        }

        .form-control::placeholder {
            color: var(--text-light);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: linear-gradient(135deg, var(--cafe-brown) 0%, var(--cafe-light) 100%);
            color: var(--white);
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: var(--font-size-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            letter-spacing: 1px;
            margin-top: var(--spacing-md);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(44, 31, 23, 0.3);
        }

        .signup-prompt {
            text-align: center;
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-light);
        }

        .signup-prompt p {
            color: var(--text-light);
            margin: 0;
        }

        .signup-prompt a {
            color: var(--gold);
            font-weight: 700;
            transition: color var(--transition-base);
        }

        .signup-prompt a:hover {
            color: var(--cafe-brown);
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .login-header {
                padding: var(--spacing-lg) var(--spacing-md);
            }

            .login-body {
                padding: var(--spacing-lg);
            }

            .login-header .logo {
                width: 200px;
                height: 100px;
            }

            .login-header h1 {
                font-size: var(--font-size-xl);
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img class="logo" src="images/image.png" alt="MEGO Craft Coffee">
                <h1>Mego Craft Coffee</h1>
                <p>Welcome Back</p>
            </div>
            <div class="login-body">
                <form action="login.php" method="POST">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" placeholder="Enter your username"
                            required autofocus>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="Enter your password"
                            required>
                    </div>
                    <button class="btn-login" type="submit">Sign In</button>
                </form>
                <div class="signup-prompt">
                    <p>Don't have an account? <a href="signup.html">Sign Up Here</a></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
